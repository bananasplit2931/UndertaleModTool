name: Build My Theme

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Build
        run: dotnet publish UndertaleModTool/UndertaleModTool.csproj -c Release -o ./output

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: UndertaleModTool-MyTheme
          path: ./output/